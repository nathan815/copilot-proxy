services:
  caddy:
    image: caddy:2-alpine
    container_name: copilot-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:4141:4141"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-entrypoint.sh:/entrypoint.sh:ro
      - ./setup.html:/srv/setup.html:ro
    entrypoint: /bin/sh
    command: ["/entrypoint.sh"]
    env_file:
      - .env
    environment:
      - PROXY_AUTH_TOKEN=${PROXY_AUTH_TOKEN:?Run .\copilotproxy.ps1 token first}
    depends_on:
      - copilot-proxy

  copilot-proxy:
    image: ghcr.io/nathan815/copilot-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copilot-proxy
    restart: unless-stopped
    expose:
      - "4141"
    volumes:
      - copilot-data:/root/.local/share/copilot-api
      - ./config.yaml:/root/.local/share/copilot-api/config.yaml:ro

  setup-server:
    image: python:3-alpine
    volumes:
      - ./remote-setup-server.py:/app/remote-setup-server.py:ro
      - ./remote-setup.sh:/etc/caddy/remote-setup.sh:ro
    environment:
      - PROXY_AUTH_TOKEN=${PROXY_AUTH_TOKEN}
      - PROXY_HOST=localhost:4141
    command: python3 /app/remote-setup-server.py
    profiles:
      - setup

volumes:
  copilot-data:
