services:
  copilot-proxy:
    image: ghcr.io/nathan815/copilot-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copilot-proxy
    restart: unless-stopped
    ports:
      - "4141:4141"
    volumes:
      - copilot-data:/root/.local/share/copilot-api
      - ./config.yaml:/app/config.yaml:ro

volumes:
  copilot-data:
