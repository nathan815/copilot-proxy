services:
  tailscale:
    image: ghcr.io/nathan815/copilot-proxy-tailscale:latest
    build:
      context: .
      dockerfile: Dockerfile.tailscale
    container_name: copilot-proxy-tailscale
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_HOSTNAME=${TS_HOSTNAME:-copilot-proxy}
    volumes:
      - tailscale-state:/var/lib/tailscale
    ports:
      - "4141:4141"
      - "4143:4143"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=2", "https://api.github.com/zen"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  caddy:
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    ports: !reset []
    environment:
      - PROXY_UPSTREAM=127.0.0.1:4142

  copilot-proxy:
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    expose: !reset []
    command: ["start", "--port", "4142", "--host", "127.0.0.1"]

  setup-server:
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy

volumes:
  tailscale-state:
