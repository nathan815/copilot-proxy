services:
  tailscale:
    image: ghcr.io/nathan815/copilot-proxy-tailscale:latest
    build:
      context: .
      dockerfile: Dockerfile.tailscale
    container_name: copilot-proxy-tailscale
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_HOSTNAME=${TS_HOSTNAME:-copilot-proxy}
    volumes:
      - tailscale-state:/var/lib/tailscale
    ports:
      - "4141:4141"
      - "4142:4142"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

  caddy:
    network_mode: service:tailscale
    depends_on:
      - tailscale
    ports: !reset []
    environment:
      - PROXY_UPSTREAM=localhost:4142

  copilot-proxy:
    network_mode: service:tailscale
    depends_on:
      - tailscale
    expose: !reset []
    command: ["start", "--port", "4142"]

  setup-server:
    network_mode: service:tailscale
    depends_on:
      - tailscale

volumes:
  tailscale-state:
